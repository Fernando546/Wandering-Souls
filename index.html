<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Wandering Souls - A 2D Top-Down RPG Adventure" />
    <title>Wandering Souls</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Press+Start+2P&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/ui/styles.css" />
  </head>
  <body>
    <div id="game-shell">
      <aside id="left-dock">
        <button id="chat-toggle-btn" type="button">Chat</button>
        <div id="chat-panel" class="collapsed">
          <div class="chat-header">
            <span>Global Chat</span>
            <button id="chat-collapse-btn" type="button">x</button>
          </div>
          <div id="chat-messages">
            <div class="chat-message system">[System] Welcome to Wandering Souls.</div>
          </div>
          <div class="chat-input-row">
            <input id="chat-input" type="text" maxlength="120" placeholder="Type your message..." />
            <button id="chat-send-btn" type="button">Send</button>
          </div>
        </div>
      </aside>

      <section id="center-stage">
        <div id="game-container"></div>

        <div id="viewport-frame">
          <div class="frame-corner top-left"></div>
          <div class="frame-corner top-right"></div>
          <div class="frame-corner bottom-left"></div>
          <div class="frame-corner bottom-right"></div>
        </div>

        <div id="dialogue-container" class="hidden">
          <div id="dialogue-speaker"></div>
          <div id="dialogue-text"></div>
          <div id="dialogue-choices"></div>
        </div>
      </section>

      <aside id="right-panel">
        <div class="panel-section panel-gear">
          <h2 class="panel-title">Character Gear</h2>
          <div id="equipment-slots"></div>
        </div>

        <div class="panel-section panel-bags">
          <div class="panel-row">
            <h2 class="panel-title">Bags</h2>
            <div id="bag-tabs">
              <button class="bag-tab active" data-bag-index="0">I</button>
              <button class="bag-tab" data-bag-index="1">II</button>
              <button class="bag-tab" data-bag-index="2">III</button>
            </div>
          </div>

          <div id="bag-grid"></div>
          <p id="inventory-status">Tip: Drag items from your bags onto equipment slots.</p>
        </div>
      </aside>

      <div id="bottom-ui">
        <div id="hud">
          <div id="hud-bars">
            <div class="stat-bar" id="hp-bar-container">
              <div class="stat-bar-fill" id="hp-bar-fill"></div>
              <span class="stat-bar-text" id="hp-bar-text">100 / 100</span>
            </div>
            <div class="stat-bar" id="mana-bar-container">
              <div class="stat-bar-fill" id="mana-bar-fill"></div>
              <span class="stat-bar-text" id="mana-bar-text">50 / 50</span>
            </div>
          </div>
          <div id="hud-info">
            <span id="hud-level">Lv. 1</span>
            <div class="stat-bar" id="xp-bar-container">
              <div class="stat-bar-fill" id="xp-bar-fill"></div>
              <span class="stat-bar-text" id="xp-bar-text">0 / 100 XP</span>
            </div>
          </div>
        </div>

        <div id="action-cluster">
          <div id="action-bar">
            <div class="skill-btn" id="skill-primary">
              <div class="skill-key">LMB</div>
              <div class="skill-cd" id="cd-primary"></div>
            </div>
            <div class="skill-btn" id="skill-1">
              <div class="skill-key">1</div>
              <div class="skill-cd" id="cd-q"></div>
            </div>
            <div class="skill-btn" id="skill-2">
              <div class="skill-key">2</div>
              <div class="skill-cd" id="cd-e"></div>
            </div>
          </div>
          <div id="action-caption">Move: WASD | Interact: E | Attack: LMB / 1 / 2</div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
